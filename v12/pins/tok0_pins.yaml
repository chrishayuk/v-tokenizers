g1_threshold_decision_log_2026_07_19: >
  Chris explicitly instructed resolving the three TOK-1 threshold pins (census_F_max,
  census_R_max, MSI_canonical_min) rather than leaving them open. Recording plainly, not
  glossing over it: this decision was made AFTER real candidate data (candidates.jsonl, 9
  trained candidates + incumbent) already existed and had been read -- it does NOT carry the
  data-snooping-immunity guarantee that genuine pre-registration (deciding thresholds before
  any candidate exists) would have provided. Treated as an honest, principled-reasoning
  decision, not a blind one, and disclosed as such rather than silently presented as if it
  were pre-registered.

  Reasoning per threshold, stated independent of which specific candidates it does/doesn't
  admit (checked against the data only as a sanity pass afterward, not fit to a target
  outcome):
  - census_F_max = 2.0: "no candidate should cost more than 2x the ideal single-token cost
    (fertility 1.0) on priority T-core concepts" -- a round, domain-motivated multiplicative
    bar consistent with the whole point of v11's knowledge-first redesign (guaranteed
    single-token coverage of priority targets). Sanity check against real data: SP-family and
    incumbent cluster at 1.0-1.16 (comfortably under); byte_level_bpe at 1.6-1.9 (under);
    pure_byte at 4.29 (over, but exempt as Branch B regardless of this threshold).
  - census_R_max = 0.95: DELIBERATELY PERMISSIVE, not a real quality bar yet. The
    category_5_fraction measurement it gates is computed against the 32-file harness sample
    corpus (see evaluate_candidate.py), not the real C8/C2-scale corpus -- a small sample
    structurally cannot exercise most of a several-thousand-item vocab, so every candidate's
    measured category-5 fraction is inflated by the instrument itself, not a genuine estimate
    of true accidental-dead behavior. Setting a tight threshold from this data would be
    scientifically unsound. 0.95 is close to a no-op (only rejects near-total non-exercise) so
    the gate can run without pretending this proxy is trustworthy yet. MUST be recalibrated
    once category-5 is measured at real C8/C2 scale -- do not treat 0.95 as a considered
    quality bar in any later analysis.
  - MSI_canonical_min = 0.25: the design doc's own pin comment already frames this as
    "PROVISIONAL floor, pending shadow-lane validation at TOK-2c" -- i.e. the doc itself defers
    a real decision to a later stage. Set low (0.25, the floor already met by every
    SentencePiece-family candidate) rather than aspirationally high, specifically because the
    measured msi_canonical values here are MSI-STRICT, a LOWER BOUND proxy (class-2
    canonicalization isn't implemented yet -- see bench/msi/canonicalizer.py), not the true
    MSI-canonical rate. A high floor now would hard-eliminate every non-byte-level candidate
    based on an admittedly incomplete measurement, pre-empting exactly the shadow-lane/TOK-2c
    validation the doc says should do that job.

  Practical effect on THIS candidate grid, computed independently of the threshold values
  above: 6 of 9 real candidates (all unigram_sp/bpe_sp) are eliminated at the earlier HARD
  REJECT step (round_trip_pass=false, unk_count=144 -- see the already-registered
  round-trip/UNK findings) regardless of what these three thresholds are set to. Only
  byte_level_bpe_4000_v0 and byte_level_bpe_8000_v0 reach the threshold/Pareto stage; both
  clear all three thresholds above by a wide margin. byte_level_bpe_8000_v0 Pareto-dominates
  byte_level_bpe_4000_v0 on all three minimize axes (compression, t_core_fertility,
  t_scale_fertility) with a tie on t_cell_coverage, so it wins its family outright (no
  tie-break needed). Real `grid-screen` output registered in chuk-experiments.

incumbent_ledger:
  vocab_total: 71261     # confirmed against ../../v11/artifacts/v11.vocab.json (71260 pieces + special ids)
  vocab_exercised: 17158  # per design doc; NOT independently re-derived here (needs C2 atlas stream)
  tied_params_at_d512: "~36M (~1/3 of a 115M active budget)"
  category_5_unmasked_estimate: "~54k rows"
  fails_C7: true  # no dormant map
  C6_status: "unaudited"
  g0_msi_profile: "carries 3 documented sharp-end incidents: CN-7 day-1 mismatch (NLL 18.0 vs 0.66), CN-10 space-piece lens bug, atlas raw-id/text-query undercount"
  newly_discovered_2026_07_19: >
    4th issue found by this harness's real roundtrip check (bench/tokenizer_bench.py roundtrip,
    driving the compiled v11 binary): 32/32 files in v11/corpus fail exact UTF-8
    round-trip. Root cause at v11-core/src/pretokenize.rs::metaspace()/reverse_metaspace() --
    every whitespace run (space/tab/newline, any length) collapses to one WORD_START marker on
    encode, and decode always reconstructs it as a literal ASCII space, never '\n' or '\t';
    trailing whitespace is dropped entirely. Every newline in a document decodes as a plain
    space; this is a hard reject under the doc's own §2.3 round-trip gate. Not yet reflected in
    the "3 documented incidents" count above -- reported here pending Chris folding it in.
  newly_discovered_2026_07_19_b: >
    Originally logged as a separate "5th issue" (a Python/Rust parity gap: 114 vs 115 tokens,
    0 vs 1 UNK on chromosome.txt) -- now ROOT-CAUSED and confirmed to be the SAME bug as
    newly_discovered_2026_07_19 above, not a distinct issue. Verified directly against the
    real `tokenizers` library: HF's Metaspace pre-tokenizer splits chunks ONLY on the literal
    ASCII space character (0x20) -- tab/newline/CR are NOT split points and stay embedded
    verbatim inside their chunk (confirmed: `Metaspace(...).pre_tokenize_str('a\tb\nc\rd  e')`
    -> `[('▁a\tb\nc\rd', ...), ('▁', ...), ('▁e', ...)]`). v11-core's own reimplementation
    (`pretokenize_chunks()` in tokenizer.rs, used by the real encode path, and
    `metaspace()`/`reverse_metaspace()` in pretokenize.rs) instead treats ANY
    `char::is_ascii_whitespace()` as a chunk boundary -- one divergence, two symptoms: decode
    collapses all non-space whitespace to a literal space (the original finding), and encode
    silently drops/mis-chunks non-space whitespace (chromosome.txt's single trailing '\n' is
    dropped as a delimiter by v11-core -> 114 tok/0 UNK, but real HF glues it onto the last
    chunk where it has no vocab piece -> 1 extra UNK -> 115 tok/1 UNK, confirmed token-for-
    token). Fix identified but NOT applied (changing the incumbent's production runtime is a
    real decision for Chris, not something to unilaterally patch during screening): both
    functions should split on literal 0x20 only, not is_ascii_whitespace(). Registered as
    result `v11_metaspace_root_cause_confirmed` on RUN-20260718-224711-00385.
  fix_applied_2026_07_19: >
    The metaspace fix above WAS applied (per Chris's instruction "lets patch v11"):
    pretokenize_chunks()/metaspace()/reverse_metaspace() now split on literal space (0x20)
    only. 18/18 v11-core unit tests pass (4 new regression tests), full `cargo test --workspace`
    passes. Rebuilt release binary; chromosome.txt now gives 115 tok/1 UNK via the compiled
    Rust binary, token-for-token identical to real HF tokenizers -- the Rust-vs-tokenizer.json
    parity gap is closed and verified (not just argued). Disclosed side effect: unk_gate_pass
    flips true->false on the 32-file harness sample (0->662 UNK total) because v11's vocab has
    zero pieces for literal tab/newline -- this is the fix correctly REVEALING a real,
    pre-existing vocab coverage gap, not a regression. Round-trip still fails 32/32 files, now
    for the honest reason. Registered as result `v11_metaspace_fix_applied_and_verified` on
    RUN-20260718-224711-00385.
  MAJOR_2026_07_19_three_way_divergence: >
    While verifying the fix above, found something bigger, NOT fixed, flagged for Chris:
    native SentencePiece loading the real, sha-verified v11.model (sha256 4ffbfc87...c1dc8e6,
    matches C2_eval_stream.tokenizer_used_for_this_dump exactly -- this is the actual file
    corpus-atlas's a0_dump_stream.py used to build the already-frozen C2 24M-token eval
    stream) gives 99 tokens/0 UNK on chromosome.txt -- neither the old NOR the newly-patched
    Rust/tokenizer.json pair (114or115/0or1) matches this. Root cause: v11.model's own
    normalizer_spec (read directly from the protobuf) is `name: nmt_nfkc,
    remove_extra_whitespaces: True, add_dummy_prefix: True` -- native SentencePiece NFKC-
    normalizes and collapses EVERY whitespace run before tokenizing. tokenizer.json has
    `normalizer: null` -- this step was dropped entirely at whatever export produced
    tokenizer.json/vocab.bin from v11.model. This is a DISTINCT, EARLIER, LARGER bug than the
    pretokenization-chunking one just fixed (export-time normalizer loss, not a Rust
    reimplementation gap) -- it means the frozen, pinned C2 stream was built with a tokenizer
    that disagrees with the artifacts (tokenizer.json/vocab.bin) this repo's own harness and
    Rust runtime use, a direct tension with C5 ("every artifact carries tokenizer sha256...
    refuses hash-mismatched input"). Deliberately NOT reconciled this session -- reconciling
    means deciding which artifact (v11.model's native SP behavior, or tokenizer.json's
    Metaspace-only behavior) is canonical for TOK-0/C5 purposes, a decision for Chris. Registered
    as result `v11_three_way_implementation_divergence` (verdict fail) on
    RUN-20260718-224711-00385.
  RESOLVED_2026_07_19_canonical_tokenizer_decision: >
    Per Chris's explicit instruction, DECIDED (not a further code patch -- a provenance/
    authority decision): tokenizer.json's behavior (Metaspace, split on literal space 0x20
    only, normalizer=null) is CANONICAL for v11 going forward, in this repo and any consumer
    of it. Reasoning: (1) it's what the actual shipped artifacts (v11/artifacts/tokenizer.json,
    v11.vocab.bin) and the production Rust runtime (v11-core, post-fix) implement; (2) two
    independent implementations -- the compiled Rust binary and the real HF `tokenizers`
    library -- now agree on it exactly, verified token-for-token, which is the strongest
    concrete evidence available for what "v11" actually is as a running system; (3) the
    nmt_nfkc/remove_extra_whitespaces behavior native SentencePiece applies via v11.model was
    dropped at whatever export produced tokenizer.json -- meaning tokenizer.json was already
    the intended shipped/normalized artifact, and the export silently changed behavior nobody
    caught until this session, not the other way around.

    Consequence, stated plainly rather than swept under the rug: the already-frozen,
    already-built C2 24M-token eval stream (owned by the separate corpus-atlas project, built
    via native SentencePiece directly against v11.model) was tokenized under DIFFERENT
    (whitespace-collapsing) semantics than the now-canonical tokenizer.json path. This is now
    a documented, known characteristic of that specific frozen artifact -- not an open
    question blocking other work, and NOT something regenerated as part of this decision:
    regenerating C2 is out of scope here (lives in a different repo/project, corpus-atlas, and
    is an expensive multi-million-token build Chris would need to explicitly commission, not
    something to trigger unilaterally while resolving a tokenizer-canonicity question).
    Anyone consuming C2 for cross-tokenizer comparison should know its raw-text re-tokenization
    (via a0_dump_stream.py, per-candidate) will differ from tokenizer.json-based candidates
    specifically on documents containing tab/newline/multi-space runs -- a real, bounded,
    disclosed caveat on that artifact, not a blocker on TOK-1 grid-screen or anything in this
    repo.

