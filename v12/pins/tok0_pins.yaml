five_way_census_taxonomy:
  1_padding: "alignment-only; never semantic; absent from serialized raw-token stream"
  2_active_specials: "BOS/EOS/document separators etc.; legitimately exercised; merge-opaque"
  3_dormant_interface: "T-cell; fixed semantics, merge-opaque, masked until activation"
  4_dormant_scale: "T-scale; fixed semantics, masked until activation"
  5_accidental_dead: "expected to participate but absent/undertrained (count < N); ONLY this category counts against a candidate"

msi_classes:
  1_identical: "genuine id-level copy"
  2_losslessly_canonicalizable: "frozen, context-free deterministic transducer maps every framed encoding to one canonical operand sequence"
  3_context_entangled: "merges obscure operand boundaries or make conversion ambiguous — fatal"

