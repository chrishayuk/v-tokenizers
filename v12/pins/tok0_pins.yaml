hardening_pass_2026_07_19: >
  Per Chris's instruction ("harden it") after the first G1 run: replaced the illustrative T-core
  stub (31 rows: "the", "a", "cat", ...) with a REAL 538-item target set drawn from v11's own
  config.json (build_t_core.py: language_extras -- 379 real per-language priority builtins/types
  across 10 languages; infra math/greek/legal/currency symbols -- 231; acronyms -- 46; deduped by
  text). Scaled the C8 corpus 11.4x (v0: 1.9MB/5,595 rows -> v1: 21.6MB/70,031 rows;
  N_PROSE 1500->20000, N_MATH 4000->50000; code stays ~105KB, real v-tokenizers-scoped harvest,
  not sampled -- disclosed: code's mixture share fell from 15.7% to 0.5% since it doesn't scale
  with N_PROSE/N_MATH, a real characteristic of v1, not hidden). Retrained the vocab-size axis at
  candidate_grid.yaml's real targets: bpe_sp and byte_level_bpe reach the full [4000,8000,16000,32000]
  (bpe_sp's new SentencePiece ceiling on v1 is 33876, clears 32000); unigram_sp tops out at 13000
  (v1 ceiling 13331 -- even an 11.4x corpus scale-up only moved the ceiling from 6923->13331, NOT
  linear; reaching 32000 for unigram would need a corpus roughly two orders of magnitude larger
  than v0, not practical in this pass -- disclosed, not silently worked around).

  RESULT, RE-EVALUATED AGAINST THE REAL T-CORE: every trained candidate's t_core_fertility roughly
  DOUBLED (SP-family: ~1.0 -> 2.0-2.9; byte_level_bpe: ~1.6-1.9 -> 2.4-2.9) because the stub set
  (common English words) is trivially single-token for any subword tokenizer and was never
  discriminating. v11_incumbent measures 1.320 on the same real set -- meaningfully better than
  every vanilla-trained candidate, none of which clear census_F_max=2.0. Real grid-screen run:
  **zero non-exempt survivors** (only v11_incumbent/pure_byte_v0 exempt). All unigram_sp/bpe_sp
  (v0 and v1) hard-reject on the pre-existing round-trip/UNK gap (unrelated to T-core); all
  byte_level_bpe threshold-reject on t_core_fertility > F_max.

  CONFIRMATORY EXPERIMENT: tested why the incumbent beats vanilla-trained candidates on T-core --
  retrained bpe_sp_16000 with T-core seeded as SentencePiece `user_defined_symbols`, matching
  v11-builder's own real technique (src/main.rs: injects both bare AND `▁`-prefixed forms of
  priority tokens). First attempt (bare form only) still measured t_core_fertility=2.0 exactly,
  not ~1.0 -- diagnosed directly (`sp.encode('int') -> ['▁','int']`): SentencePiece's
  add_dummy_prefix normalization prepends `▁` before matching, so a standalone word needs the
  PREFIXED form registered too. Second attempt (both forms) confirmed the fix:
  `sp.encode('int') -> ['▁int']`, t_core_fertility=1.0 exactly (id `bpe_sp_16000_v1_tcoreseed`).
  This validates a real, replicable path for any future TOK-1 candidate to match the incumbent's
  T-core fertility -- explicit priority-token injection, not better vanilla training -- but this
  seeded candidate still hard-rejects on the SAME round-trip/UNK gap as every other SP-family
  candidate (unk_count=897), confirming that gap is orthogonal to T-core fertility, not fixed by
  this technique.

  NOT attempted this pass (disclosed as real remaining gaps, not silently skipped): seeding
  byte_level_bpe similarly (HF `tokenizers` ByteLevelBPETokenizer's own priority-injection
  mechanism, unexplored); fixing the SentencePiece-family round-trip/UNK gap itself (same root
  cause as the incumbent's own known vocab-coverage gap for embedded tab/newline -- would need
  either byte-fallback or explicit whitespace-piece training, a real design decision); the
  pre_tokenization axis (whitespace_split/digit_isolating/code_aware) from candidate_grid.yaml,
  still entirely unimplemented; recalibrating census_R_max against real-scale category-5
  measurements (still deliberately permissive, per the original decision log above, and v1's
  category_5_fraction values are marginally worse than v0's since a bigger vocab against the
  same 32-file v11/corpus eval sample exercises a smaller fraction of it -- expected, not a
  regression, and still not a reason to tighten R_max without a bigger eval sample too).

hardening_pass_2026_07_19_round2: >
  Follow-up same day ("yeah do it" -- pursuing the round-trip/UNK gap, byte_level_bpe seeding,
  and further corpus scale). TWO of three attempted:

  (a) byte_fallback + normalization_rule_name=identity: SentencePiece's byte_fallback option
  (uncovered chars encode via <0xNN> byte pieces instead of <unk>) genuinely, completely fixes
  the UNK half of the round-trip/UNK hard-reject -- unk_count=0 across all 32 v11/corpus files
  for every retrained candidate (7 full-grid + 1 combined with T-core seeding). round_trip_pass
  is STILL false for all of them. Root-caused precisely, going deeper than the earlier 3-way
  divergence finding: `sp.normalize('    x: float\n')` -> `'▁x:▁float\n'` even under
  normalization_rule_name="identity" -- SentencePiece's mandatory built-in metaspace-substitution
  step collapses runs of consecutive literal spaces into ONE marker, and this is NOT reachable
  via normalizer_spec/normalization_rule_name at all (identity only strips NFKC + nmt_nfkc's
  *extra*-whitespace rule, not the base add_dummy_prefix/metaspace mechanism itself). This means
  native SentencePiece's own encode() pipeline cannot structurally replicate real HF Metaspace's
  "one marker per literal space, no collapsing" semantics through ANY public training-time
  toggle -- the only real fix is loading a SentencePiece-trained vocab through a properly
  constructed HF tokenizers.Tokenizer (Unigram/BPE model + explicit Metaspace pretokenizer)
  instead of native SentencePieceProcessor.encode()/decode(), i.e. exactly the technique that
  already makes tokenizer.json diverge from v11.model. NOT built this pass (nontrivial for BPE
  specifically: extracting/converting SentencePiece's internal merge representation into HF's
  ordered-merges format is real, bounded, but real engineering work, not attempted). See result
  byte_fallback_fixes_unk_not_roundtrip.

  (b) byte_level_bpe T-core seeding: does NOT transfer cleanly from SentencePiece. Tried (1)
  ByteLevelBPETokenizer.train(special_tokens=[...]) -- tokens land in vocab but encode() ignores
  them for matching (special_tokens there means control tokens, not priority-injection with
  match guarantees); (2) tok.add_tokens([...]) post-training -- DOES force exact-match priority
  for the literal string, but the leading-space byte-remap ('Ġ') and the added-token lookup
  operate on mismatched representations, so 'OAuth' still splits as ['Ġ','OAuth'] instead of
  fusing to ['ĠOAuth']. Real negative/partial result, not silently dropped -- a real fix needs a
  custom PreTokenizer/normalizer-level intervention, not attempted this pass. See result
  byte_level_bpe_seeding_partial_negative.

  (c) further C8 scaling: NOT attempted this round -- (a) and (b) took priority as the
  higher-leverage items (affecting the whole SP-family hard-reject and the byte_level_bpe
  threshold-reject respectively), and this session's time was reallocated to a comparative
  analysis against known-strong published tokenizers (see below) at Chris's request. Still real
  remaining work, unblocked whenever picked back up (assemble_c8_corpus.py's N_PROSE/N_MATH are
  simple knobs, code corpus scaling would need new source dirs).

  NET RESULT: re-running grid-screen against the full 30-row grid (including all byte_fallback
  and seeded variants) still gives survivors=[] -- unchanged from the first hardening pass, but
  now for a more precisely understood reason (UNK is solved; round-trip is a deeper, distinct,
  diagnosed-but-unsolved issue; T-core fertility is solved for SentencePiece via seeding but not
  yet for byte_level_bpe). See result g1_hardened_result_zero_survivors_v2.

external_review_2026_07_19: >
  An external review of the public repo (received the same day, after making v-tokenizers
  public) was substantively accurate and led to real fixes, not just discussion. Key points
  taken on board:
  1. "v11 is publish-ready" was OVERSTATED given the real, disclosed 662-UNK/32-of-32-round-trip-
     fail gate result on its own corpus -- README.md and v12/README.md corrected to lead with
     the byte-safety blocker prominently rather than bury it; CI's roundtrip step renamed to
     "[KNOWN FAILING -- v11 not yet byte-safe]" rather than silently continue-on-error with no
     visible signal.
  2. Grid-completeness language corrected: this is an algorithm x vocab-size PILOT with a byte
     baseline, not the full 4x4x3 grid (pre_tokenization axis entirely unimplemented) -- was
     technically disclosed before but not stated as plainly as it should have been.
  3. Corpus domain-proportion drift (code 15.7%->0.5% when prose/math scaled and code didn't)
     needs fixing by freezing domain proportions BY BYTES at every corpus scale -- agreed,
     not yet implemented (real follow-up work).
  4. C2 provenance concern (frozen eval stream tokenized by one contender, not tokenizer-
     neutral) -- partially already addressed and clarified: a0_dump_stream.py (in the separate
     corpus-atlas project) already re-tokenizes the same pinned RAW TinyStories stream under any
     candidate tokenizer, which is exactly the "freeze raw bytes, not one contender's token IDs"
     invariant the review asks for. The review may not have had visibility into this (it's
     documented here but is a mechanism in a different repo) -- corrected, not silently agreed
     with, since the concern wasn't fully accurate as stated.
  5. Reframing of the T-core seeding finding as "the central v11 advantage may come from
     vocabulary injection, not the custom segmentation algorithm" is a genuinely sharper
     hypothesis than this pins file had stated it -- worth carrying forward.
  6. Proposed decisive next experiment (4 tokenizer families x 2 vocab sizes x 2 model scales,
     real training, real downstream metrics) is exactly TOK-2/TOK-3 territory per this doc's own
     funnel design -- correctly identifies that G1's intrinsic metrics can only prune candidates,
     not select a production tokenizer. NOT started -- needs GPU compute and an explicit
     scoping decision from Chris, same as every other TOK-2+ item in this file.

wrapper_fix_and_first_real_survivor_2026_07_19: >
  Per Chris's instruction ("yeah do the wrapper fix first"): built the HF Tokenizer wrapper
  identified as the real fix in hardening_pass_2026_07_19_round2. A byte_fallback-trained
  SentencePiece model's pieces+scores loaded into a real tokenizers.Tokenizer
  (models.Unigram(vocab, unk_id, byte_fallback=True) + explicit non-collapsing
  pre_tokenizers.Metaspace, matching RESOLVED_2026_07_19_canonical_tokenizer_decision) instead
  of native SentencePieceProcessor.encode()/decode(). New backend: HFWrappedSPBackend in
  evaluate_candidate.py.

  Found and fixed a real bug while building it: decoders.Metaspace() alone leaves <0xNN>
  byte-fallback tokens as their literal escape-string text on decode ("<0x0A>" as 6 literal
  chars, not the actual newline byte) -- fixed by chaining
  decoders.Sequence([decoders.ByteFallback(), decoders.Metaspace(...)]), ByteFallback first to
  reassemble raw bytes/multi-byte UTF-8 before Metaspace converts markers back to spaces.
  Confirmed the Unigram model type works for BOTH unigram- and bpe-trained SentencePiece models
  (bpe-trained pieces carry usable merge-order-derived scores too) -- no separate BPE-merge-list
  converter needed.

  RESULT: 0 UNK, 0/32 round-trip failures -- a COMPLETE fix, not partial (was 32/32 round-trip
  failures via native SPBackend on the SAME trained model, despite 0 UNK already there too).
  Re-evaluated all 8 byte_fallback-trained candidates via this backend, kept native-SP
  evaluation side by side as *_native rows rather than silently replacing them.

  IMPORTANT: this fixes v12 CANDIDATES, not v11 itself. Checked directly: v11's own
  tokenizer.json, loaded via plain HF tokenizers (bypassing the Rust CLI), ALREADY uses this
  exact canonical Metaspace and STILL shows 543 UNK / 32-of-32 round-trip fail -- v11's gap is
  that its vocab has no byte-fallback pieces at all (v11-builder never added byte_fallback
  support), a vocab-construction gap, not a pretokenizer/wrapping one. Fixing v11 itself means
  changing its frozen vocab, tied to already-trained TinyModel embedding weights -- a separate,
  much bigger decision, explicitly NOT done here and flagged as distinct from what was fixed.

  COMBINING both validated fixes from this session (T-core seeding + this wrapper fix) into one
  candidate, bpe_sp_16000_v1_tcoreseed_bytefallback, produces THE FIRST REAL, NON-EXEMPT GATE G1
  SURVIVOR in this entire funnel: real grid-screen run gives survivors=[bpe_sp_16000_v1_tcoreseed_bytefallback].
  t_core_fertility=1.0, round_trip_pass=true, unk_count=0, category_5_fraction=0.94 (under
  R_max=0.95). Pareto-dominates its sibling outright, no tie-break needed. All plain
  unigram_sp/bpe_sp candidates (with byte_fallback but WITHOUT T-core seeding) still
  threshold-reject on fertility; neither fix alone was sufficient, both together were needed.

  SCOPE, stated plainly: a real, earned SCREENING-stage survivor on prototype-scale data (21.6MB
  C8, not frozen; 538-item T-core, not the doc's frozen commitment; category-5 measured on the
  32-file v11/corpus sample, not real C8/C2 scale). NOT a claim this is the final production
  tokenizer -- that needs TOK-2/TOK-3 real model training, per this doc's own design and per the
  external review's own correct point that intrinsic metrics can only prune, not select.
  Results: hf_wrapper_fixes_roundtrip_completely, first_real_g1_survivor on
  RUN-20260718-224841-00387.

vocab_sizing_experiment_2026_07_19: >
  Per Chris's explicit vocab philosophy (not Kimi/o200k/Gemma scale 160K-262K -- "too large...
  needs to be appropriate for 115M to 1B model" -- and architecture-driven: embedding sizes
  cluster at round boundaries like 16K/32K, so an odd size like 18K doesn't avoid the jump to
  32K, it's neither clean nor efficiently packed): scaled corpus again (v2: 80MB, 200,031 rows)
  to push unigram_sp's ceiling toward 30K -- landed at 20527 plain / 18317 seeded (seeding itself
  costs vocab budget, a real disclosed finding), diminishing returns again, did not chase 30K
  further per Chris's explicit preference against over-investing in scale.

  Trained matched controls at exactly 16000 (bpe_sp and unigram_sp, both plain and T-core-seeded,
  same v2 corpus) to remove both the algorithm confound and the earlier corpus-version confound.
  RESULT, directly answering the sizing question: unigram_sp at 16000 vs 18000 -- compression
  0.4773 vs 0.4747 (0.5% relative difference), t_scale_fertility IDENTICAL (1.250 both),
  t_core_fertility identical (1.0 both). Staying at the round 16K boundary costs approximately
  nothing versus 18K.

  REAL GAP FOUND AND DISCLOSED: the new matched-16K candidates did not become new G1 survivors
  despite clearing every gate -- they were Pareto-dominated by their own siblings (v1's bpe_16000
  beats v2's bpe_16000 slightly; unigram's 18000 weakly beats its own 16000 on compression).
  g1_selection.py's four Pareto axes have NO vocab-size/embedding-parameter-cost axis --
  Gate G1 as implemented will always prefer bigger vocab within a family given even a marginal
  compression edge, with no mechanism to reward "smaller for equal real-world cost." Chris's
  sizing question is answered here by reading candidates.jsonl directly, not by trusting G1's
  survivor list -- a real, disclosed algorithm limitation, not silently patched (adding a real
  embedding-cost axis is a design-doc-level change; C9's FLOPs/Time cost-matching principles
  already gesture at this but G1 doesn't operationalize it yet).

  Current real survivors remain: [bpe_sp_16000_v1_tcoreseed_bytefallback,
  unigram_sp_18000_v2_tcoreseed_bytefallback] -- both genuinely earned, both still screening-stage
  results on prototype-scale data. Result: matched_16k_comparison_and_g1_size_axis_gap on

v11_pinned_replication_and_tok2_held_out_reversal_2026_07_20: >
  CONTEXT: an earlier TOK-2 held-out comparison (see tok-2b-fixed-trunk / phase1 results in
  tiny-model's model/v11-train/) found both bpe_sp_16000_v1_tcoreseed_bytefallback and
  unigram_sp_18000_v2_tcoreseed_bytefallback beating v11 on held-out BPB (5.85% and 10.65%
  respectively). Per Chris's own methodological critique, that comparison was flagged as resting
  on an unverified assumption: v11's original training (tiny-model/model/v11-train/
  train_tinystories.py) never pinned a TinyStories hub revision, so its exact training-time
  document set could not be reconstructed -- its held-out cleanliness against the frozen
  seed=777 evaluation set was ASSUMED, not verified, unlike the three v12 candidates (which
  train against a pinned hub_sha and so are hash-checkable).

  WHAT WAS BUILT: tiny-model/model/v11-train/train_v11_replication.py -- an exact replica of
  v11's original training methodology (same architecture, native v11.model tokenizer, fixed
  16M/8M token budget, seeds 42/43, two-phase full+frozen-FFN recipe) with one change:
  revision=HUB_SHA pinned on both dataset loads, matching every other pinned run in this funnel.
  eval_held_out.py was extended to hash-check BOTH phase1's seed=42 stream (59,715 documents
  consumed, the same shared boundary the v12 candidates use) AND phase3's seed=43 stream
  (30,608 documents), excluding the union (59,997 unique documents) from the frozen 2000-story
  held-out set -- 49,927 seed=777 documents had to be skipped to find 2000 truly clean ones.

  WHAT RAN: phase1 only (16.0M/16.0M tokens, real training, ~1h50m on M3 Max @ ~2490 tok/s).
  Per Chris's explicit instruction, stopped intentionally right after model_full.pt saved,
  before phase3 began -- phase3 (frozen-FFN retrain, 8M tokens) deferred to a future session.
  train_v11_replication.py is unchanged and can be rerun to produce model_compiled.pt later.

  RESULT -- REVERSES the earlier conclusion. On the exact same verified-clean 2000-story
  held-out set (1,913,160 bytes):
    v11_pinned_replication_full (verified clean):  held_out_bpb = 0.6846
    v11 (original, unverified):                    held_out_bpb = 0.7900  (13.3% worse)
    bpe_sp_16000_v1_tcoreseed_bytefallback:         held_out_bpb = 0.7461  (9.0% worse)
    unigram_sp_18000_v2_tcoreseed_bytefallback:     held_out_bpb = 0.7062  (3.2% worse)
    unigram_sp_16000_v2_tcoreseed_bytefallback:     held_out_bpb = 0.7058  (3.1% worse)
  The verified-clean v11 replication beats every v12 TOK-1 survivor at matched byte budget,
  phase1-only. v11's own two runs (original vs. pinned replication) share identical training
  loss (2.1660 vs 2.1710, 0.23% apart) and identical tokenizer/compression (0.29092 tok/byte,
  confirmed via held_out_compression matching exactly between the two v11 rows) yet differ by
  13.3% on held-out BPB -- the gap is real model-quality variance from which exact documents
  each run's seed=42 stream happened to draw (hub revision differs: unverified April run vs.
  pinned July hub_sha), not a tokenizer or measurement artifact. Sanity-checked using the same
  audit Chris requested on the previous (later-defended) result: held_out_compression is
  computed per-checkpoint from that checkpoint's own real tok.encode() output and matches each
  candidate's independently-measured intrinsic compression within 0.4-2.3% -- no cross-candidate
  token-count contamination found.

  CAVEATS, disclosed not hidden: (1) single run each side, no repeated-seed variance estimate --
  the 13.3% gap between two nominally-identical-methodology v11 runs is itself evidence of
  real run-to-run noise at this scale, so this result is directionally strong but not a
  zero-uncertainty final answer; ideally wants multiple seeds before being treated as settled.
  (2) phase1-only for every row here (matches what's being compared -- v11's original
  model_full.pt vs. v12 candidates' equivalent checkpoints) -- NOT yet a comparison against
  v11's true best "compiled"/frozen-FFN checkpoint, which needs phase3 to actually run.
  (3) TinyStories-only evaluation, same as every prior TOK-2 result in this funnel --
  broader-domain (code/math/JSON/multilingual) evaluation is still future work.

  IMPLICATION: the funnel's provisional TOK-2 story ("v12's screening survivors beat the
  incumbent") does not currently hold once the incumbent side of the comparison is held to the
  same verification standard as the challengers -- exactly the failure mode Chris's critique
  was aimed at catching. TOK-2 should not be considered decided in either direction until
  phase3 is rerun for the replication and, ideally, more than one seed is run per side.
  RUN-20260718-224841-00387.
