name: Release (manual)

# Manual-only release pipeline for v11 -- crates.io, PyPI, and HuggingFace
# Hub. Never fires automatically (workflow_dispatch only) and refuses to do
# anything unless the confirm input is typed exactly. Each destination is
# its own job behind the same guard, and independently toggleable, so a
# single run can target just one of them if that's all you need.
#
# v12 is deliberately NOT included here -- it's an active, pre-registered
# research funnel (see v12/pins/tok0_pins.yaml) and stays unpublished until
# a candidate wins the funnel.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   CARGO_REGISTRY_TOKEN  -- crates.io API token, for publish_crates
#   PYPI_TOKEN            -- PyPI API token, for publish_pypi (maturin-action
#                            reads it via MATURIN_PYPI_TOKEN)
#   HF_TOKEN              -- HuggingFace write-access token, for publish_hf
# None of these exist yet as of this workflow's authoring -- set them
# before the first real dispatch, `gh secret set NAME` (run it yourself,
# so the value never appears in any chat/transcript) is the simplest way.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm you mean to actually publish v11'
        required: true
      hf_repo_id:
        description: "HuggingFace repo id to push the tokenizer to (replaces its contents)"
        required: true
        default: "chrishayuk/v11-tokenizer"
      publish_crates:
        description: "Publish to crates.io (v11-core, v11-builder, v11-cli, in that order)"
        type: boolean
        default: true
      publish_pypi:
        description: "Publish to PyPI (v11-python, via maturin)"
        type: boolean
        default: true
      publish_hf:
        description: "Publish to HuggingFace Hub"
        type: boolean
        default: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: require explicit confirmation
        if: ${{ github.event.inputs.confirm != 'publish' }}
        run: |
          echo "Confirmation input did not match 'publish' -- stopping without publishing anything."
          exit 1

  # Ordering matters: v11-builder/v11-cli/v11-python all depend on v11-core
  # via { path = "../core", version = "0.1.0" } (needed so `cargo publish`
  # works at all -- path-only deps are rejected). Until v11-core is actually
  # live on the index, publishing any dependent crate fails with "no
  # matching package named `v11-core` found" (verified via `cargo publish
  # --dry-run` 2026-07-24) -- publish v11-core first, poll the sparse index
  # until it's actually there, then the rest.
  publish-crates:
    needs: guard
    if: ${{ github.event.inputs.publish_crates == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: publish v11-core
        run: cargo publish -p v11-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: wait for v11-core to appear on the sparse index
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "https://index.crates.io/v1/crates/v11-core" >/dev/null 2>&1; then
              echo "v11-core is live on the index"
              exit 0
            fi
            echo "not yet indexed, waiting (attempt $i/30)..."
            sleep 10
          done
          echo "v11-core never appeared on the index after 5 minutes" >&2
          exit 1
      - name: publish v11-builder
        run: cargo publish -p v11-builder --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: publish v11-cli
        run: cargo publish -p v11-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Independent of publish-crates: maturin builds v11-python from source via
  # its own path dep on v11-core, it doesn't need v11-core from the registry.
  publish-pypi:
    needs: guard
    if: ${{ github.event.inputs.publish_pypi == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # maturin-action has no python-version input; it builds against
      # whatever `python3` resolves to on PATH. GitHub's macos-latest
      # default is 3.14, newer than PyO3 0.22's max supported 3.13
      # ("the configured Python interpreter version (3.14) is newer than
      # PyO3's maximum supported version (3.13)", real failure 2026-07-24)
      # -- pin explicitly rather than bump PyO3 blind.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: publish
          args: --skip-existing -m v11/python/Cargo.toml
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-hf:
    needs: guard
    if: ${{ github.event.inputs.publish_hf == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.24"
      - name: push v11 tokenizer artifacts (replaces existing repo contents)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ github.event.inputs.hf_repo_id }}
        run: |
          python3 - <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_REPO_ID"]
          api.create_repo(repo_id, repo_type="model", exist_ok=True)
          # delete_patterns="*" first: a genuine replace, not an overlay that
          # leaves stale files from whatever was there before.
          api.upload_folder(
              folder_path="v11/artifacts",
              repo_id=repo_id,
              repo_type="model",
              allow_patterns=[
                  "tokenizer.json",
                  "tokenizer_config.json",
                  "special_tokens_map.json",
                  "README.md",
              ],
              delete_patterns=["*"],
              commit_message="v11: byte-safety fix (0 UNK, 0 round-trip mismatches on the 32-file gate corpus)",
          )
          PYEOF
