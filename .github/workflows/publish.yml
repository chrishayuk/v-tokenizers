  # publish-crate:
  #   needs: guard
  #   runs-on: macos-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - run: cargo publish -p v11-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
  #     - run: cargo publish -p v11-builder --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
  #     - run: cargo publish -p v11-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
